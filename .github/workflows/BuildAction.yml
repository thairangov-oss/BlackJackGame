name: BlackJackGame Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Pull down your repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install the .NET SDK (adjust version to match your project)
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # Step 3: Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore BlackJackGame.csproj
        # Runs: dotnet restore BlackJackGame.csproj
        # Meaning: downloads and restores all NuGet packages your project depends on

      # Step 4: Build the project in Release mode
      - name: Build project
        run: dotnet build BlackJackGame.csproj --configuration Release --no-restore
        # Runs: dotnet build BlackJackGame.csproj --configuration Release --no-restore
        # Meaning: compiles your C# project in Release mode without re-restoring packages

      # Step 5: Print a success message
      - name: Success message
        run: echo "BlackJackGame built successfully!"
        # Runs: echo "BlackJackGame built successfully!"
        # Meaning: prints a confirmation message to the workflow logs


