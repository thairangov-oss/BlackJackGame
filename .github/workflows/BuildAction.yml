name: .NET Build & Test

on:
  push:
    branches:
      - main
      - NewFeature-Branch
  pull_request:
    branches:
      - main
      - NewFeature-Branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore BlackJackGame.csproj

    - name: Build
      run: dotnet build BlackJackGame.csproj --no-restore --configuration Release

    - name: Run tests
      run: dotnet test BlackJackGame.csproj --no-build --verbosity normal


    

