name: BlackJackGame Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BlackJackGame/BlackJackGame.csproj

      - name: Build project
        run: dotnet build BlackJackGame/BlackJackGame.csproj --configuration Release --no-restore

      - name: Success message
        run: echo "BlackJackGame built successfully!"


