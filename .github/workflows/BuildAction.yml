name: Build and Test

on:
  push:
    branches:
      - main
      - Feature-Branch
  pull_request:
    branches:
      - main
      - Feature-Branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5   # upgrade when available

      - name: Setup .NET
        uses: actions/setup-dotnet@v5   # upgrade when available
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BlackJackGame.csproj

      - name: Build
        run: dotnet build BlackJackGame.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test BlackJackGame.csproj --no-build --configuration Release --verbosity normal



